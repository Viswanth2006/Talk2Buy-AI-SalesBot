<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk2Buy – Voice AI Sales Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --bg4: #1e1e28;
    --surface: #22222e;
    --surface2: #2a2a38;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --accent3: #c4b5fd;
    --gold: #f59e0b;
    --gold2: #fbbf24;
    --teal: #14b8a6;
    --teal2: #2dd4bf;
    --coral: #f97316;
    --text: #f0eeff;
    --text2: #a09ab8;
    --text3: #5c566e;
    --success: #22c55e;
    --danger: #ef4444;
    --r: 12px;
    --r2: 20px;
    --r3: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 360px 1fr;
    grid-template-rows: 64px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo span { color: var(--accent3); }

  .header-badge {
    margin-left: auto;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    color: var(--accent3);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .header-stats {
    display: flex;
    gap: 20px;
    margin-left: 24px;
  }

  .hstat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hstat-val {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent2);
  }

  .hstat-lab {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* VOICE ORB SECTION */
  .voice-section {
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }

  .orb-container {
    position: relative;
    width: 120px;
    height: 120px;
    cursor: pointer;
  }

  .orb-rings {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(124,92,252,0.25);
    animation: ring-pulse 3s ease-in-out infinite;
  }

  .orb-ring:nth-child(1) { inset: -12px; animation-delay: 0s; }
  .orb-ring:nth-child(2) { inset: -24px; animation-delay: 0.5s; opacity: 0.6; }
  .orb-ring:nth-child(3) { inset: -36px; animation-delay: 1s; opacity: 0.3; }

  @keyframes ring-pulse {
    0%,100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  .orb-ring.listening {
    animation: ring-listening 0.8s ease-in-out infinite alternate;
    border-color: rgba(124,92,252,0.7);
  }

  @keyframes ring-listening {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }

  .orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #a78bfa, #7c5cfc 40%, #4f35c7 75%, #1e1230);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 0.2s;
    box-shadow: 0 0 0 1px rgba(124,92,252,0.3), 0 20px 60px rgba(124,92,252,0.4);
  }

  .orb:hover { transform: scale(1.04); }
  .orb:active { transform: scale(0.97); }

  .orb-inner {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.3s;
  }

  .orb.listening { animation: orb-glow 1.2s ease-in-out infinite alternate; }
  .orb.speaking { animation: orb-speak 0.6s ease-in-out infinite alternate; }

  @keyframes orb-glow {
    from { box-shadow: 0 0 0 1px rgba(124,92,252,0.4), 0 20px 60px rgba(124,92,252,0.5); }
    to { box-shadow: 0 0 0 1px rgba(124,92,252,0.7), 0 20px 80px rgba(124,92,252,0.7), 0 0 40px rgba(167,139,250,0.4); }
  }

  @keyframes orb-speak {
    from { transform: scale(1); }
    to { transform: scale(1.03); }
  }

  .orb-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* Voice Bars */
  .voice-bars {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .voice-bars.active { opacity: 1; }

  .vbar {
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    min-height: 4px;
    transition: height 0.1s;
  }

  /* Mode Buttons */
  .mode-buttons {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .mode-btn {
    flex: 1;
    padding: 9px 0;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    border-radius: var(--r);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .mode-btn:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
  .mode-btn.active { background: rgba(124,92,252,0.2); color: var(--accent3); border-color: rgba(124,92,252,0.5); }

  /* TEXT INPUT */
  .text-input-wrap {
    padding: 0 24px 20px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .text-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input::placeholder { color: var(--text3); }
  .text-input:focus { border-color: rgba(124,92,252,0.5); }

  .send-btn {
    width: 40px;
    background: var(--accent);
    border: none;
    border-radius: var(--r);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }

  /* CHAT MESSAGES */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msg-in 0.3s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .msg-bubble {
    max-width: 90%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.55;
  }

  .msg.user .msg-bubble {
    background: rgba(124,92,252,0.25);
    border: 1px solid rgba(124,92,252,0.3);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.bot .msg-bubble {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    padding: 0 4px;
  }

  .bot-avatar {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    margin-bottom: 4px;
  }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 24px;
    flex-shrink: 0;
  }

  .tab {
    padding: 16px 20px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent3); border-bottom-color: var(--accent); }

  .tab-content {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  /* PRODUCT GRID */
  .products-area {
    padding: 24px;
    display: none;
  }

  .products-area.active { display: block; }

  .products-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }

  .products-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 5px 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-chip:hover, .filter-chip.active {
    background: rgba(124,92,252,0.15);
    border-color: rgba(124,92,252,0.4);
    color: var(--accent3);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
  }

  .product-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
  }

  .product-card:hover {
    border-color: rgba(124,92,252,0.4);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .product-card.highlighted {
    border-color: rgba(124,92,252,0.6);
    box-shadow: 0 0 0 1px rgba(124,92,252,0.3), 0 12px 40px rgba(124,92,252,0.2);
  }

  .product-img {
    width: 100%;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    position: relative;
    background: var(--bg4);
  }

  .product-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-hot { background: rgba(239,68,68,0.25); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
  .badge-new { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.35); }
  .badge-deal { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.35); }
  .badge-top { background: rgba(124,92,252,0.2); color: var(--accent3); border: 1px solid rgba(124,92,252,0.35); }

  .product-info {
    padding: 14px;
  }

  .product-category {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .product-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
    line-height: 1.3;
  }

  .product-stars {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 10px;
  }

  .stars { color: var(--gold2); font-size: 11px; letter-spacing: 1px; }
  .review-count { font-size: 11px; color: var(--text3); }

  .product-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--teal2);
  }

  .product-old-price {
    font-size: 12px;
    color: var(--text3);
    text-decoration: line-through;
    margin-left: 4px;
  }

  .add-btn {
    width: 32px; height: 32px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-weight: 300;
  }

  .add-btn:hover { background: var(--accent2); transform: scale(1.1); }
  .add-btn.added { background: var(--success); }

  /* CART */
  .cart-area {
    padding: 24px;
    display: none;
  }

  .cart-area.active { display: block; }

  .cart-empty {
    text-align: center;
    padding: 60px 0;
    color: var(--text3);
  }

  .cart-empty-icon { font-size: 48px; margin-bottom: 12px; }

  .cart-items { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

  .cart-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: msg-in 0.3s ease;
  }

  .cart-item-emoji { font-size: 32px; width: 44px; height: 44px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .cart-item-price { font-size: 13px; color: var(--teal2); font-weight: 600; }

  .cart-qty {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .qty-btn {
    width: 26px; height: 26px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .qty-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .qty-num { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }

  .cart-remove {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
  }

  .cart-remove:hover { color: var(--danger); }

  .cart-summary {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 20px;
  }

  .cart-sum-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 10px;
  }

  .cart-sum-total {
    display: flex;
    justify-content: space-between;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
    margin-bottom: 16px;
  }

  .checkout-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #5b2fd4);
    border: none;
    border-radius: var(--r);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .checkout-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(124,92,252,0.5); }
  .checkout-btn:active { transform: translateY(0); }

  /* RECOMMENDATIONS */
  .rec-area {
    padding: 24px;
    display: none;
  }

  .rec-area.active { display: block; }

  .rec-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .rec-card:hover { border-color: rgba(124,92,252,0.35); transform: translateX(4px); }
  .rec-rank { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--surface2); min-width: 40px; }
  .rec-emoji { font-size: 40px; width: 60px; height: 60px; flex-shrink: 0; }
  .rec-info { flex: 1; }
  .rec-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .rec-why { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .rec-price { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--teal2); white-space: nowrap; }

  /* Suggested Queries */
  .suggested {
    padding: 12px 24px 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .sugg-btn {
    padding: 5px 12px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .sugg-btn:hover {
    background: rgba(124,92,252,0.15);
    border-color: rgba(124,92,252,0.35);
    color: var(--accent3);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--success);
    border-radius: var(--r);
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* SEARCH bar in header */
  .header-search {
    flex: 1;
    max-width: 320px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 7px 14px 7px 34px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .header-search input:focus { border-color: rgba(124,92,252,0.4); }
  .header-search input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
  }

  /* TRANSCRIPT label */
  .voice-status {
    font-size: 12px;
    color: var(--text3);

let cart = [];
let currentFilter = 'all';
let isListening = false;
let isSpeaking = false;
let voiceMode = 'voice';
let recognition = null;
let synth = window.speechSynthesis;
let voiceAnimFrame = null;
let highlightedIds = [];

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-IN';
    recognition.onstart = () => {
      isListening = true;
      setOrbState('listening');
      setVoiceStatus('Listening…', 'listening');
      document.getElementById('voiceBars').classList.add('active');
      animateBars();
    };
    recognition.onresult = (e) => {
      let interim = '';
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      if (interim) setVoiceStatus('"' + interim + '"', 'listening');
      if (final) processQuery(final.trim());
    };
    recognition.onerror = (e) => {
      stopListening();
      if (e.error !== 'no-speech') showToast('❌ Voice error: ' + e.error, 'danger');
    };
    recognition.onend = () => { stopListening(); };
  }
}

function toggleVoice() {
  if (voiceMode !== 'voice') return;
  if (isListening) { stopListening(); return; }
  if (recognition) {
    try { recognition.start(); } catch(e) { showToast('🎤 Mic unavailable. Use text mode.'); }
  } else {
    showToast('⚠️ Voice not supported in this browser. Try Chrome!');
  }
}

function stopListening() {
  isListening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  setOrbState('idle');
  setVoiceStatus('Tap orb to speak', '');
  document.getElementById('voiceBars').classList.remove('active');
  cancelAnimationFrame(voiceAnimFrame);
}

function setOrbState(state) {
  const orb = document.getElementById('orb');
  const icon = document.getElementById('orbIcon');
  const rings = document.querySelectorAll('.orb-ring');
  orb.classList.remove('listening','speaking');
  rings.forEach(r => r.classList.remove('listening'));
  if (state === 'listening') {
    orb.classList.add('listening');
    rings.forEach(r => r.classList.add('listening'));
    icon.textContent = '🎤';
  } else if (state === 'speaking') {
    orb.classList.add('speaking');
    icon.textContent = '🔊';
  } else {
    icon.textContent = '🎤';
  }
}

function setVoiceStatus(txt, cls) {
  const el = document.getElementById('voiceStatus');
  el.textContent = txt;
  el.className = 'voice-status ' + (cls||'');
}

function animateBars() {
  const bars = ['vb1','vb2','vb3','vb4','vb5','vb6','vb7'];
  bars.forEach(id => {
    const h = 4 + Math.random() * 24;
    document.getElementById(id).style.height = h + 'px';
  });
  voiceAnimFrame = requestAnimationFrame(animateBars);
}

function setMode(mode) {
  voiceMode = mode;
  document.getElementById('btnVoice').classList.toggle('active', mode === 'voice');
  document.getElementById('btnText').classList.toggle('active', mode === 'text');
  document.getElementById('textInputWrap').style.display = mode === 'text' ? 'flex' : 'none';
  document.getElementById('suggestedWrap').style.display = mode === 'text' ? 'flex' : 'flex';
}

function sendText() {
  const inp = document.getElementById('textInput');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  processQuery(val);
}

function quickAsk(q) {
  processQuery(q);
}

function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const time = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  if (role === 'bot') {
    div.innerHTML = `<div class="bot-avatar">T2B</div><div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bot-avatar">T2B</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function speak(text) {
  if (!synth) return;
  synth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-IN';
  utterance.rate = 1.05;
  utterance.pitch = 1.0;
  const voices = synth.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Samantha')));
  if (preferred) utterance.voice = preferred;
  utterance.onstart = () => { isSpeaking = true; setOrbState('speaking'); setVoiceStatus('Speaking…', 'speaking'); document.getElementById('voiceBars').classList.add('active'); animateBars(); };
  utterance.onend = () => { isSpeaking = false; setOrbState('idle'); setVoiceStatus('Tap orb to speak', ''); document.getElementById('voiceBars').classList.remove('active'); cancelAnimationFrame(voiceAnimFrame); };
  synth.speak(utterance);
}

function processQuery(query) {
  addMessage('user', query);
  addTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    const response = generateResponse(query.toLowerCase(), query);
    addMessage('bot', response.text);
    if (voiceMode === 'voice') speak(response.speak || response.text.replace(/<[^>]+>/g,'').slice(0,200));
    if (response.action) response.action();
  }, 800 + Math.random() * 400);
}

function generateResponse(q, original) {
  // Compare intent
  if ((q.includes('compare') || q.includes('vs') || q.includes('versus') || q.includes('difference between')) && (q.includes('iphone') || q.includes('samsung') || q.includes('laptop') || q.includes('macbook') || q.includes('sony'))) {
    return compareProducts(q);
  }
  // Cart intent
  if (q.includes('add') && (q.includes('cart') || q.includes('buy') || q.includes('purchase'))) {
    return handleAddToCart(q);
  }
  // Best / top / recommend
  if (q.includes('best') || q.includes('recommend') || q.includes('suggest') || q.includes('top rated')) {
    return recommendProducts(q);
  }
  // Show category
  if (q.includes('smartphone') || q.includes('phone') || q.includes('mobile')) {
    return showCategory('smartphone', q);
  }
  if (q.includes('laptop') || q.includes('macbook') || q.includes('notebook')) {
    return showCategory('laptop', q);
  }
  if (q.includes('earbuds') || q.includes('headphone') || q.includes('headset') || q.includes('audio') || q.includes('speaker')) {
    return showCategory('audio', q);
  }
  if (q.includes('camera') || q.includes('dslr') || q.includes('mirrorless') || q.includes('photography')) {
    return showCategory('camera', q);
  }
  if (q.includes('watch') || q.includes('wearable') || q.includes('fitness')) {
    return showCategory('wearable', q);
  }
  if (q.includes('tv') || q.includes('television') || q.includes('oled') || q.includes('qled')) {
    return showCategory('tv', q);
  }
  if (q.includes('tablet') || q.includes('ipad')) {
    return showCategory('tablet', q);
  }
  // Price intent
  if (q.includes('under') || q.includes('budget') || q.includes('cheap') || q.includes('affordable') || q.includes('price')) {
    return handleBudgetQuery(q);
  }
  // Deal / discount
  if (q.includes('deal') || q.includes('discount') || q.includes('offer') || q.includes('sale')) {
    return showDeals();
  }
  // Cart view
  if (q.includes('cart') || q.includes('basket')) {
    switchTab('cart');
    const total = cart.reduce((s,c) => s + c.price * c.qty, 0);
    return { text: `You have ${cart.length} item(s) in your cart totaling ₹${total.toLocaleString('en-IN')}. I've opened your cart!`, speak: `You have ${cart.length} items in cart.` };
  }
  // Greetings
  if (q.includes('hello') || q.includes('hi') || q.includes('hey') || q.includes('namaste')) {
    return { text: "👋 Hey there! I'm your Talk2Buy AI Sales Assistant. I can help you discover <b>smartphones, laptops, headphones, cameras, smartwatches, TVs & tablets</b>. Just tell me what you're looking for — or ask me to compare products, find deals, or suggest something within your budget!", speak: "Hey! I'm Talk2Buy. Tell me what product you are looking for today!" };
  }
  // Thank you
  if (q.includes('thank') || q.includes('thanks')) {
    return { text: "😊 You're welcome! Is there anything else I can help you find today? I have great deals across phones, laptops, audio gear and more!", speak: "You are welcome! Anything else I can help you with?" };
  }
  // Default
  return {
    text: `🤔 I'm not sure about that specific query. Here's what I can help you with:<br>• <b>Find products</b> – "Show me Samsung phones"<br>• <b>Compare items</b> – "Compare iPhone vs Samsung"<br>• <b>Budget search</b> – "Laptops under ₹60,000"<br>• <b>Deals</b> – "Show me today's best deals"<br>• <b>Add to cart</b> – "Add Sony headphones to cart"`,
    speak: "I can help you find products, compare items, or search within your budget. What are you looking for?"
  };
}

function showCategory(cat, q) {
  filterProducts(cat, null);
  switchTab('products');
  const items = PRODUCTS.filter(p => p.category === cat);
  const catNames = { smartphone:'smartphones 📱', laptop:'laptops 💻', audio:'audio devices 🎧', camera:'cameras 📷', wearable:'smartwatches ⌚', tv:'televisions 📺', tablet:'tablets 📲' };
  // Budget check
  let budget = null;
  const match = q.match(/under\s*(?:₹|rs\.?|inr)?\s*(\d+[\d,]*)/i);
  if (match) budget = parseInt(match[1].replace(/,/g,''));
  let filtered = items;
  let budgetText = '';
  if (budget) {
    filtered = items.filter(p => p.price <= budget);
    budgetText = ` under ₹${budget.toLocaleString('en-IN')}`;
    showFilteredResults(filtered);
  }
  const top = filtered.slice(0,3);
  const names = top.map(p => p.name).join(', ');
  return {
    text: `Great choice! Here are our ${catNames[cat]}${budgetText}. I'm showing ${filtered.length} options. Top picks: <b>${names}</b>. All come with warranty and easy returns! 🛡️`,
    speak: `Here are our ${catNames[cat]}. We have ${filtered.length} options for you.`
  };
}

function showFilteredResults(items) {
  highlightedIds = items.map(p => p.id);
  renderProducts(items);
  document.getElementById('productsTitle').textContent = `Filtered Results (${items.length})`;
}

function handleBudgetQuery(q) {
  const match = q.match(/(\d+[\d,]*)/);
  if (!match) return { text: "What's your budget? Tell me like 'Show me phones under ₹50,000' and I'll find the best options!", speak: "What is your budget?" };
  const budget = parseInt(match[1].replace(/,/g,''));
  const filtered = PRODUCTS.filter(p => p.price <= budget);
  showFilteredResults(filtered);
  switchTab('products');
  return {
    text: `Found <b>${filtered.length} products</b> within ₹${budget.toLocaleString('en-IN')}! Showing them now. Best value picks include: ${filtered.slice(0,3).map(p => p.name).join(', ')}.`,
    speak: `Found ${filtered.length} products within your budget.`
  };
}

function showDeals() {
  const deals = PRODUCTS.filter(p => p.badge === 'deal' || p.badge === 'hot');
  showFilteredResults(deals);
  switchTab('products');
  const savings = deals.reduce((s,p) => s + (p.oldPrice - p.price), 0);
  return {
    text: `🔥 Hot deals alert! Found <b>${deals.length} products on sale</b>. You could save up to ₹${savings.toLocaleString('en-IN')} today! Best deals: ${deals.slice(0,3).map(p => p.name + ' (save ₹' + (p.oldPrice-p.price).toLocaleString('en-IN') + ')').join(', ')}.`,
    speak: `Found ${deals.length} great deals with big savings today!`
  };
}

function handleAddToCart(q) {
  const product = PRODUCTS.find(p => {
    const n = p.name.toLowerCase();
    return q.includes(n.toLowerCase()) || n.split(' ').some(w => w.length > 4 && q.includes(w.toLowerCase()));
  });
  if (product) {
    addToCart(product.id);
    return {
      text: `✅ Added <b>${product.name}</b> (₹${product.price.toLocaleString('en-IN')}) to your cart! Great choice. Would you like to see similar products or proceed to checkout?`,
      speak: `Added ${product.name} to your cart.`
    };
  }
  return {
    text: "Which product would you like to add? You can say 'Add Sony WH-1000XM5 to cart' or tap the + button on any product card.",
    speak: "Which product would you like to add to cart?"
  };
}

function compareProducts(q) {
  let p1, p2;
  if (q.includes('iphone') && q.includes('samsung')) {
    p1 = PRODUCTS.find(p => p.name.includes('iPhone'));
    p2 = PRODUCTS.find(p => p.name.includes('Samsung Galaxy S'));
  } else if (q.includes('macbook') || q.includes('macbook') && q.includes('dell')) {
    p1 = PRODUCTS.find(p => p.name.includes('MacBook'));
    p2 = PRODUCTS.find(p => p.name.includes('Dell'));
  } else if (q.includes('sony') && q.includes('bose')) {
    p1 = PRODUCTS.find(p => p.name.includes('Sony WH'));
    p2 = PRODUCTS.find(p => p.name.includes('Bose'));
  } else {
    p1 = PRODUCTS[0]; p2 = PRODUCTS[1];
  }
  if (!p1 || !p2) return { text: "Tell me which two products you'd like to compare! E.g., 'Compare iPhone vs Samsung' or 'Compare Sony vs Bose headphones'." };
  const save1 = p1.oldPrice - p1.price;
  const save2 = p2.oldPrice - p2.price;
  return {
    text: `📊 <b>Comparison: ${p1.name} vs ${p2.name}</b><br><br>
<b>${p1.name}</b><br>💰 ₹${p1.price.toLocaleString('en-IN')} (save ₹${save1.toLocaleString('en-IN')})<br>⭐ ${p1.rating}/5 (${p1.reviews.toLocaleString()} reviews)<br>📝 ${p1.desc}<br><br>
<b>${p2.name}</b><br>💰 ₹${p2.price.toLocaleString('en-IN')} (save ₹${save2.toLocaleString('en-IN')})<br>⭐ ${p2.rating}/5 (${p2.reviews.toLocaleString()} reviews)<br>📝 ${p2.desc}<br><br>
🏆 <b>Winner:</b> ${p1.rating >= p2.rating ? p1.name : p2.name} edges ahead on ratings!`,
    speak: `Comparing ${p1.name} and ${p2.name}. ${p1.name} is rated ${p1.rating} and costs ${p1.price.toLocaleString('en-IN')} rupees. ${p2.name} is rated ${p2.rating} and costs ${p2.price.toLocaleString('en-IN')} rupees.`,
    action: () => {
      highlightedIds = [p1.id, p2.id];
      filterProducts('all', null);
      switchTab('products');
      setTimeout(() => {
        document.querySelectorAll('.product-card').forEach(card => {
          const id = parseInt(card.dataset.id);
          card.classList.toggle('highlighted', highlightedIds.includes(id));
        });
      }, 100);
    }
  };
}

function recommendProducts(q) {
  let pool = PRODUCTS;
  if (q.includes('phone') || q.includes('smartphone')) pool = PRODUCTS.filter(p => p.category === 'smartphone');
  else if (q.includes('laptop')) pool = PRODUCTS.filter(p => p.category === 'laptop');
  else if (q.includes('headphone') || q.includes('earbuds')) pool = PRODUCTS.filter(p => p.category === 'audio');
  const sorted = [...pool].sort((a,b) => b.rating - a.rating || b.reviews - a.reviews).slice(0,5);
  renderRecs(sorted);
  switchTab('recs');
  return {
    text: `⭐ Based on ratings & popularity, here are my top recommendations:<br>${sorted.map((p,i) => `<b>${i+1}. ${p.name}</b> — ⭐ ${p.rating} (${p.reviews.toLocaleString()} reviews) — ₹${p.price.toLocaleString('en-IN')}`).join('<br>')}`,
    speak: `My top recommendation is ${sorted[0].name} with a rating of ${sorted[0].rating} out of 5.`
  };
}

function renderProducts(items) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = items.map(p => {
    const stars = '★'.repeat(Math.floor(p.rating)) + (p.rating % 1 >= 0.5 ? '½' : '');
    const inCart = cart.find(c => c.id === p.id);
    const savePct = Math.round((1 - p.price/p.oldPrice) * 100);
    return `<div class="product-card ${highlightedIds.includes(p.id) ? 'highlighted' : ''}" data-id="${p.id}" onclick="showProductDetail(${p.id})">
      <div class="product-img">
        <img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">
        ${p.badge ? `<div class="product-badge badge-${p.badge}">${p.badge === 'hot' ? '🔥 Hot' : p.badge === 'new' ? '✨ New' : p.badge === 'deal' ? `${savePct}% OFF` : '🏆 Top'}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-stars">
          <span class="stars">${'★'.repeat(Math.floor(p.rating))}</span>
          <span style="font-size:11px;color:var(--text2)">${p.rating}</span>
          <span class="review-count">(${p.reviews.toLocaleString()})</span>
        </div>
        <div class="product-price-row">
          <div>
            <span class="product-price">₹${p.price.toLocaleString('en-IN')}</span>
            <span class="product-old-price">₹${p.oldPrice.toLocaleString('en-IN')}</span>
          </div>
          <button class="add-btn ${inCart ? 'added' : ''}" onclick="event.stopPropagation();addToCart(${p.id})" title="Add to cart">${inCart ? '✓' : '+'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderRecs(items) {
  const grid = document.getElementById('recsGrid');
  grid.innerHTML = items.map((p,i) => `
    <div class="rec-card" onclick="showProductDetail(${p.id})">
      <div class="rec-rank">#${i+1}</div>
      <div class="rec-emoji"><img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"></div>
      <div class="rec-info">
        <div class="rec-name">${p.name}</div>
        <div class="rec-why">⭐ ${p.rating}/5 · ${p.reviews.toLocaleString()} reviews · ${p.category}</div>
        <div class="rec-why" style="margin-top:4px">${p.desc.slice(0,60)}…</div>
      </div>
      <div>
        <div class="rec-price">₹${p.price.toLocaleString('en-IN')}</div>
        <button class="add-btn" onclick="event.stopPropagation();addToCart(${p.id})" style="margin-top:8px;width:100%;border-radius:8px">+</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) return;
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...product, qty: 1 });
  updateCartUI();
  showToast(`✅ ${product.name} added to cart!`);
  // update add button
  document.querySelectorAll(`[onclick*="addToCart(${id})"]`).forEach(btn => {
    btn.classList.add('added');
    btn.textContent = '✓';
  });
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s,c) => s + c.price * c.qty, 0);
  const totalItems = cart.reduce((s,c) => s + c.qty, 0);
  const savings = cart.reduce((s,c) => s + (c.oldPrice - c.price) * c.qty, 0);
  document.getElementById('statCart').textContent = totalItems;
  document.getElementById('statSaved').textContent = '₹' + savings.toLocaleString('en-IN');
  document.getElementById('cartTab').textContent = `🛒 Cart${totalItems > 0 ? ' ('+totalItems+')' : ''}`;

  const content = document.getElementById('cartContent');
  if (cart.length === 0) {
    content.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div style="font-size:16px;font-weight:500;margin-bottom:8px">Your cart is empty</div><div style="font-size:13px;color:var(--text3)">Ask me to recommend something or browse products!</div></div>`;
    return;
  }
  const tax = Math.round(total * 0.18);
  const shipping = total > 50000 ? 0 : 499;
  content.innerHTML = `
    <div class="cart-items">${cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-emoji"><img src="${item.image}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"></div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">₹${item.price.toLocaleString('en-IN')} × ${item.qty} = ₹${(item.price*item.qty).toLocaleString('en-IN')}</div>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${item.id})">🗑️</button>
      </div>
    `).join('')}</div>
    <div class="cart-summary">
      <div class="cart-sum-row"><span>Subtotal</span><span>₹${total.toLocaleString('en-IN')}</span></div>
      <div class="cart-sum-row"><span>GST (18%)</span><span>₹${tax.toLocaleString('en-IN')}</span></div>
      <div class="cart-sum-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : '₹'+shipping}</span></div>
      <div class="cart-sum-total"><span>Total</span><span style="color:var(--teal2)">₹${(total+tax+shipping).toLocaleString('en-IN')}</span></div>
      <button class="checkout-btn" onclick="showToast('🎉 Order placed successfully! Thank you for shopping with Talk2Buy!')">🛍️ Proceed to Checkout</button>
    </div>
  `;
}

function showProductDetail(id) {
  const p = PRODUCTS.find(prod => prod.id === id);
  if (!p) return;
  addMessage('bot', `<div style="display:flex;gap:12px;align-items:flex-start"><img src="${p.image}" alt="${p.name}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;"><div><b>${p.name}</b><br>💰 ₹${p.price.toLocaleString('en-IN')} <s style="color:var(--text3);font-size:12px">₹${p.oldPrice.toLocaleString('en-IN')}</s> | ⭐ ${p.rating}/5 (${p.reviews.toLocaleString()} reviews)<br>📋 ${p.desc}<br><br>Want me to add it to cart or compare with similar products?</div></div>`);
  if (voiceMode === 'voice') speak(`${p.name} costs ${p.price.toLocaleString('en-IN')} rupees and is rated ${p.rating} out of 5. ${p.desc.slice(0,100)}`);
}

function filterProducts(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const chips = document.querySelectorAll('.filter-chip');
    chips.forEach(c => { if (c.onclick && c.onclick.toString().includes(`'${cat}'`)) c.classList.add('active'); });
  }
  const items = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  document.getElementById('productsTitle').textContent = cat === 'all' ? 'All Products' : cat.charAt(0).toUpperCase()+cat.slice(1)+'s';
  highlightedIds = [];
  renderProducts(items);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['products','cart','recs'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('productsArea').classList.toggle('active', tab === 'products');
  document.getElementById('cartArea').classList.toggle('active', tab === 'cart');
  document.getElementById('recsArea').classList.toggle('active', tab === 'recs');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.borderLeftColor = type === 'danger' ? 'var(--danger)' : 'var(--success)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Header search
document.getElementById('headerSearch').addEventListener('input', function() {
  const val = this.value.toLowerCase().trim();
  if (!val) { filterProducts('all', null); return; }
  const results = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(val) ||
    p.category.toLowerCase().includes(val) ||
    p.desc.toLowerCase().includes(val)
  );
  highlightedIds = [];
  renderProducts(results);
  document.getElementById('productsTitle').textContent = `Search: "${this.value}" (${results.length})`;
  switchTab('products');
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
});

// Init
initVoice();
renderProducts(PRODUCTS);
updateCartUI();
renderRecs([...PRODUCTS].sort((a,b) => b.rating-a.rating).slice(0,5));

// Welcome message
setTimeout(() => {
  addMessage('bot', "👋 Welcome to <b>Talk2Buy</b>! I'm your AI-powered voice sales assistant.<br><br>🎤 <b>Tap the orb</b> to speak, or use text mode below. I can help you:<br>• Find the perfect product<br>• Compare devices<br>• Search within budget<br>• Spot the best deals<br><br>What are you shopping for today? 🛍️");
  if (voiceMode === 'voice') setTimeout(() => speak("Welcome to Talk2Buy! I am your AI voice shopping assistant. Tap the orb and tell me what you are looking for today!"), 500);
}, 600);
</script>
</body>
</html>
